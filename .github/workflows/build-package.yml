name: Build Package

on:
  push:
    branches: [ main ]

  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: [ self-hosted, windows, x64 ]
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure
      run: |
        cmake --preset msvc-multi -DFETCHCONTENT_BASE_DIR="C:/.fc"
          
    - name: Build
      run: |
        cmake --build --preset build-Release -j

    - name: Test
      run: |
        build\msvc-multi\Release\holoflow_test.exe
      
    - name: Package
      run: |
        cmake --build --preset build-Release --target package -j

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: Test
        release_name: Test
        draft: false
        prerelease: false

    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./build/msvc-multi/Holoflow-0.1.0-win64.exe
        asset_name: Holoflow-0.1.0-win64.exe
        asset_content_type: application/octet-stream
        